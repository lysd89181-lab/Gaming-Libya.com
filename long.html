<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>زاد | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card-bg: rgba(20, 20, 20, 0.9); --gold: #f5a623; --white: #fff; --muted: #a1a1aa; --neon-gold: 0 0 15px rgba(245,166,35,0.3),0 0 30px rgba(245,166,35,0.08); --border-gold: 1px solid rgba(245,166,35,0.3); }
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); background-image: radial-gradient(circle at 30% 30%, rgba(245,166,35,0.04) 0%, transparent 60%), radial-gradient(circle at 70% 70%, rgba(245,166,35,0.03) 0%, transparent 60%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; touch-action: manipulation; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        @keyframes shake { 0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
        @keyframes glowText { 0%,100%{text-shadow:0 0 10px rgba(245,166,35,0.4)}50%{text-shadow:0 0 25px rgba(245,166,35,0.8)} }
        @keyframes neonPulse { 0%,100%{box-shadow:0 0 15px rgba(245,166,35,0.3)}50%{box-shadow:0 0 30px rgba(245,166,35,0.6)} }
        .shake-error { animation: shake 0.6s ease-in-out; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: var(--border-gold); border-radius: 24px; box-shadow: var(--neon-gold); animation: fadeInUp 0.8s ease forwards; width: 100%; max-width: 420px; padding: 40px 28px; }
        .gold-text { color: var(--gold); animation: glowText 2s ease-in-out infinite; }
        .neon-input { background-color: rgba(0,0,0,0.5); border: 1px solid rgba(245,166,35,0.3); color: #fff; border-radius: 14px; font-size: 16px; padding: 14px 18px; width: 100%; outline: none; font-family: 'Cairo', sans-serif; transition: all 0.3s; }
        .neon-input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(245,166,35,0.3); }
        .neon-btn { background: linear-gradient(135deg, #b8860b, var(--gold)); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; font-size: 16px; width: 100%; border: none; cursor: pointer; box-shadow: 0 0 20px rgba(245,166,35,0.4); font-family: 'Cairo', sans-serif; transition: all 0.3s; }
        .neon-btn:active { transform: scale(0.95); }
        .outline-btn { background: transparent; border: 2px solid rgba(245,166,35,0.3); color: var(--gold); font-weight: 700; padding: 14px; border-radius: 14px; font-size: 14px; width: 100%; cursor: pointer; font-family: 'Cairo', sans-serif; }
        .logo-circle { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; animation: neonPulse 2s infinite, float 3s infinite; margin: 0 auto; }
        .logo-text { font-size: 32px; font-weight: 900; color: var(--gold); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: inline-block; animation: neonPulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.3s; } .dot:nth-child(3) { animation-delay: 0.6s; }
        .loader-spinner { width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    </style>
</head>
<body>

    <div class="glass-card space-y-6">
        <div class="text-center space-y-3">
            <div class="logo-circle"><span class="logo-text">ز</span></div>
            <h1 class="text-3xl font-black text-white">زاد<span class="gold-text"> للخدمات</span></h1>
            <p class="text-xs" style="color:var(--muted);">متجر الخدمات الإلكترونية</p>
            <div class="flex justify-center gap-1.5"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        </div>
        <div id="loginForm" class="space-y-4">
            <div><label class="text-xs text-gray-400 block mb-1">البريد الإلكتروني</label><input type="email" id="loginEmail" placeholder="example@email.com" class="neon-input text-left" dir="ltr"></div>
            <div><label class="text-xs text-gray-400 block mb-1">كلمة المرور</label><input type="password" id="loginPassword" placeholder="••••••••" class="neon-input text-left" dir="ltr"></div>
            <div id="loginError" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-center"><p id="loginErrorText" class="text-xs text-red-400 font-bold"></p></div>
            <button id="loginBtn" onclick="handleLogin()" class="neon-btn">🚀 تسجيل الدخول</button>
            <p class="text-center text-xs text-gray-400">ليس لديك حساب؟ <button onclick="showRegister()" class="text-amber-400 font-bold">إنشاء حساب</button></p>
        </div>
        <div id="registerForm" class="hidden space-y-4">
            <div><label class="text-xs text-gray-400 block mb-1">اسم المستخدم</label><input type="text" id="regName" placeholder="أدخل اسمك" class="neon-input text-right"></div>
            <div><label class="text-xs text-gray-400 block mb-1">رقم الهاتف</label><input type="tel" id="regPhone" placeholder="091xxxxxxx" class="neon-input text-left" dir="ltr"></div>
            <div><label class="text-xs text-gray-400 block mb-1">البريد الإلكتروني</label><input type="email" id="regEmail" placeholder="example@email.com" class="neon-input text-left" dir="ltr"></div>
            <div><label class="text-xs text-gray-400 block mb-1">كلمة المرور (6+ خانات)</label><input type="password" id="regPassword" placeholder="••••••••" class="neon-input text-left" dir="ltr"></div>
            <div id="regError" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-center"><p id="regErrorText" class="text-xs text-red-400 font-bold"></p></div>
            <button id="regBtn" onclick="handleRegister()" class="neon-btn">📝 إنشاء الحساب</button>
            <p class="text-center text-xs text-gray-400">لديك حساب؟ <button onclick="showLogin()" class="text-amber-400 font-bold">تسجيل الدخول</button></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            storageBucket: "cd-card-87365.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        console.log("✅ Firebase Loaded");
        window.onerror = function(msg, src, line, col, err) { console.log("❌ ERROR:", msg, "LINE:", line); };

        function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
        function showLogin() { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');
            const card = document.querySelector('.glass-card');
            errorDiv.classList.add('hidden');
            if (!email || !password) { errorText.innerText = '⚠️ أدخل البريد وكلمة المرور'; errorDiv.classList.remove('hidden'); card.classList.add('shake-error'); setTimeout(() => card.classList.remove('shake-error'), 600); return; }
            const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.innerHTML = '<span class="loader-spinner"></span> جاري الدخول...';
            auth.signInWithEmailAndPassword(email, password).then(() => window.location.href = 'index.html').catch(err => { btn.disabled = false; btn.innerHTML = '🚀 تسجيل الدخول'; errorText.innerText = '❌ ' + (err.message || 'خطأ'); errorDiv.classList.remove('hidden'); });
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('regError');
            const errorText = document.getElementById('regErrorText');
            const card = document.querySelector('.glass-card');
            errorDiv.classList.add('hidden');
            if (!name || !email || !password) { errorText.innerText = '⚠️ أدخل الاسم والبريد وكلمة المرور'; errorDiv.classList.remove('hidden'); card.classList.add('shake-error'); setTimeout(() => card.classList.remove('shake-error'), 600); return; }
            if (password.length < 6) { errorText.innerText = '⚠️ كلمة المرور 6 خانات على الأقل'; errorDiv.classList.remove('hidden'); card.classList.add('shake-error'); setTimeout(() => card.classList.remove('shake-error'), 600); return; }
            const btn = document.getElementById('regBtn'); btn.disabled = true; btn.innerHTML = '<span class="loader-spinner"></span> جاري الإنشاء...';
            auth.createUserWithEmailAndPassword(email, password).then((cred) => { return db.collection("users").doc(cred.user.uid).set({ username: name, name: name, phone: phone || '', email: email, balance: 0, role: "user", createdAt: firebase.firestore.FieldValue.serverTimestamp() }); }).then(() => { window.location.href = 'index.html'; }).catch(err => { btn.disabled = false; btn.innerHTML = '📝 إنشاء الحساب'; errorText.innerText = '❌ ' + (err.message || 'خطأ'); errorDiv.classList.remove('hidden'); });
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Enter') { if (!document.getElementById('registerForm').classList.contains('hidden')) handleRegister(); else handleLogin(); } });
    </script>
</body>
</html>
