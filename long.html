<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>زاد | تسجيل الدخول</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.9);
            --gold: #f5a623;
            --white: #fff;
            --muted: #a1a1aa;
            --neon-gold: 0 0 15px rgba(245, 166, 35, 0.3), 0 0 30px rgba(245, 166, 35, 0.08);
            --border-gold: 1px solid rgba(245, 166, 35, 0.3);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(245, 166, 35, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(245, 166, 35, 0.03) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            touch-action: manipulation;
            padding: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(245,166,35,0.3), 0 0 5px rgba(245,166,35,0.1); }
            50% { box-shadow: 0 0 30px rgba(245,166,35,0.6), 0 0 15px rgba(245,166,35,0.3); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)} }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glowText { 0%,100%{text-shadow:0 0 10px rgba(245,166,35,0.4),0 0 20px rgba(245,166,35,0.2)}50%{text-shadow:0 0 20px rgba(245,166,35,0.8),0 0 40px rgba(245,166,35,0.4),0 0 60px rgba(245,166,35,0.2)} }

        .shake-error { animation: shake 0.6s ease-in-out; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--border-gold);
            border-radius: 24px;
            box-shadow: var(--neon-gold);
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease forwards;
            width: 100%;
            max-width: 420px;
            padding: 40px 28px;
        }

        .gold-text {
            color: var(--gold);
            animation: glowText 2s ease-in-out infinite;
        }

        .neon-input {
            background-color: rgba(0,0,0,0.5);
            border: 1px solid rgba(245, 166, 35, 0.3);
            color: #ffffff;
            transition: all 0.3s ease;
            border-radius: 14px;
            font-size: 16px;
            padding: 14px 18px;
            width: 100%;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }
        .neon-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
        }

        .neon-btn {
            background: linear-gradient(135deg, #b8860b, var(--gold));
            color: #000;
            font-weight: 900;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(245,166,35,0.4);
            font-family: 'Cairo', sans-serif;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 35px rgba(245,166,35,0.7); }

        .outline-btn {
            background: transparent;
            border: 2px solid rgba(245, 166, 35, 0.3);
            color: var(--gold);
            font-weight: 700;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        .outline-btn:hover { border-color: var(--gold); background: rgba(245,166,35,0.05); }
        .outline-btn:active { transform: scale(0.95); background: rgba(245,166,35,0.15); }

        .logo-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 3px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: neonPulse 2s infinite, float 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(245,166,35,0.3);
            margin: 0 auto;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(245,166,35,0.6);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            display: inline-block;
            animation: neonPulse 1.5s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }

        .loader-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="glass-card space-y-6">
        
        <!-- الشعار -->
        <div class="text-center space-y-3">
            <div class="logo-circle">
                <span class="logo-text">ز</span>
            </div>
            <div>
                <h1 class="text-3xl font-black text-white tracking-wider">
                    زاد<span class="gold-text"> للخدمات</span>
                </h1>
                <p class="text-xs" style="color:var(--muted);">متجر الخدمات الإلكترونية الأول</p>
            </div>
            <div class="flex justify-center gap-1.5">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- فورم تسجيل الدخول -->
        <div id="loginForm" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                    </span>
                    <input type="email" id="loginEmail" placeholder="example@email.com" class="neon-input pr-10 text-left" dir="ltr" autocomplete="email">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="neon-input pr-10 text-left" dir="ltr">
                    <button onclick="togglePassword('loginPassword', this)" class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 hover:text-amber-400">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div id="loginError" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-center">
                <p id="loginErrorText" class="text-xs text-red-400 font-bold"></p>
            </div>

            <button id="loginBtn" onclick="handleLogin()" class="neon-btn flex items-center justify-center gap-2">
                <span>تسجيل الدخول</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
            </button>

            <div class="text-center">
                <p class="text-xs text-gray-400">ليس لديك حساب؟ 
                    <button onclick="showRegister()" class="text-amber-400 font-bold hover:underline">إنشاء حساب جديد</button>
                </p>
            </div>
        </div>

        <!-- فورم إنشاء الحساب -->
        <div id="registerForm" class="hidden space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">اسم المستخدم</label>
                <input type="text" id="regName" placeholder="أدخل اسمك" class="neon-input text-right">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">رقم الهاتف</label>
                <input type="tel" id="regPhone" placeholder="091xxxxxxx" class="neon-input text-left" dir="ltr">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">البريد الإلكتروني</label>
                <input type="email" id="regEmail" placeholder="example@email.com" class="neon-input text-left" dir="ltr" autocomplete="email">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 font-bold block">كلمة المرور</label>
                <input type="password" id="regPassword" placeholder="6 خانات على الأقل" class="neon-input text-left" dir="ltr">
            </div>

            <div id="regError" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-center">
                <p id="regErrorText" class="text-xs text-red-400 font-bold"></p>
            </div>

            <button id="regBtn" onclick="handleRegister()" class="neon-btn flex items-center justify-center gap-2">
                <span>إنشاء الحساب</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            </button>

            <div class="text-center">
                <p class="text-xs text-gray-400">لديك حساب بالفعل؟ 
                    <button onclick="showLogin()" class="text-amber-400 font-bold hover:underline">تسجيل الدخول</button>
                </p>
            </div>
        </div>

        <!-- تذييل -->
        <div class="text-center pt-2">
            <p class="text-[9px] text-gray-600">زاد للخدمات الإلكترونية © 2025</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjgwaMBoGwxM5BEK9nRrzNg04U0dHyAV0",
            authDomain: "zad1-85d66.firebaseapp.com",
            projectId: "zad1-85d66",
            storageBucket: "zad1-85d66.firebasestorage.app",
            messagingSenderId: "130593925562",
            appId: "1:130593925562:web:709293e6c0827103d31583"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        function shakeElement(element) {
            element.classList.add('shake-error');
            setTimeout(() => element.classList.remove('shake-error'), 600);
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('regError').classList.add('hidden');
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');
            const card = document.querySelector('.glass-card');

            errorDiv.classList.add('hidden');

            if (!email || !password) {
                errorText.innerText = '⚠️ يرجى إدخال البريد الإلكتروني وكلمة المرور';
                errorDiv.classList.remove('hidden');
                shakeElement(card);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader-spinner"></span> جاري تسجيل الدخول...';

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerHTML = '<span>تسجيل الدخول</span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>';
                    
                    let msg = '❌ بيانات الدخول غير صحيحة';
                    if (err.code === 'auth/user-not-found') msg = '❌ لا يوجد حساب بهذا البريد';
                    if (err.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
                    if (err.code === 'auth/invalid-email') msg = '❌ صيغة البريد غير صحيحة';
                    
                    errorText.innerText = msg;
                    errorDiv.classList.remove('hidden');
                    shakeElement(card);
                });
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('regBtn');
            const errorDiv = document.getElementById('regError');
            const errorText = document.getElementById('regErrorText');
            const card = document.querySelector('.glass-card');

            errorDiv.classList.add('hidden');

            if (!name || !email || !password) {
                errorText.innerText = '⚠️ يرجى إدخال الاسم والبريد وكلمة المرور';
                errorDiv.classList.remove('hidden');
                shakeElement(card);
                return;
            }

            if (password.length < 6) {
                errorText.innerText = '⚠️ كلمة المرور يجب أن تكون 6 خانات على الأقل';
                errorDiv.classList.remove('hidden');
                shakeElement(card);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader-spinner"></span> جاري إنشاء الحساب...';

            auth.createUserWithEmailAndPassword(email, password)
                .then((cred) => {
                    return db.collection("users").doc(cred.user.uid).set({
                        name: name,
                        phone: phone || '',
                        email: email,
                        wallet_balance: 0,
                        role: "customer",
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerHTML = '<span>إنشاء الحساب</span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>';
                    
                    let msg = '❌ حدث خطأ في إنشاء الحساب';
                    if (err.code === 'auth/email-already-in-use') msg = '❌ البريد مستخدم بالفعل';
                    if (err.code === 'auth/invalid-email') msg = '❌ صيغة البريد غير صحيحة';
                    if (err.code === 'auth/weak-password') msg = '❌ كلمة المرور ضعيفة جداً';
                    
                    errorText.innerText = msg;
                    errorDiv.classList.remove('hidden');
                    shakeElement(card);
                });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('registerForm').classList.contains('hidden')) {
                    handleRegister();
                } else {
                    handleLogin();
                }
            }
        });
    </script>
</body>
</html>
